apiVersion: apps/v1
kind: Deployment
metadata:
  name: plagiarismguard-nginx
  namespace: plagiarismguard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: plagiarismguard-nginx
  template:
    metadata:
      labels:
        app: plagiarismguard-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: nginx-config
          configMap:
            name: plagiarismguard-nginx-config
