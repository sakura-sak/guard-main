version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: plagiarismguard-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bsuir
      POSTGRES_USER: bsuir
      POSTGRES_PASSWORD: bsuir
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - plagiarismguard-network

  app:
    build: .
    container_name: plagiarismguard-app
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: "1"
      # Связь с Python-анализом (docker-compose.ml.yml в каталоге antiplagiarism):
      # подключите сеть antiplag к сервису app и раскомментируйте:
      # ANALYSIS_SERVICE_URL: "http://analysis:8765"
      # ANALYSIS_SERVICE_API_KEY: "если задан ANALYSIS_API_KEY в ML-сервисе"
      # Связь с ML на отдельном компьютере (доступно из сети):
      # Подстановка из `.env` в этой директории (см. env.docker.example)
      ANALYSIS_SERVICE_URL: "${ANALYSIS_SERVICE_URL}"
      ANALYSIS_SERVICE_API_KEY: "${ANALYSIS_SERVICE_API_KEY:-}"
      DATABASE_URL: "${DATABASE_URL}"
      # LDAP переменные (можно переопределить через .env файл или docker-compose.override.yml)
      # LDAP_ENABLED: "false"
      # LDAP_URL: "ldaps://ldap.bsuir.by"
      # LDAP_BASE_DN: "dc=bsuir,dc=by"
      # LDAP_BIND_DN: "uid=smdoadmin,ou=staff,dc=bsuir,dc=by"
      # LDAP_BIND_PASSWORD: "your_password"
      # LDAP_USER_SEARCH_BASES: "ou=staff,dc=bsuir,dc=by;ou=stud,dc=bsuir,dc=by"
      # LDAP_USER_SEARCH_FILTER: "(uid={username})"
      # LDAP_USERNAME_ATTRIBUTE: "uid"
      # LDAP_EMAIL_ATTRIBUTE: "mail"
      # LDAP_FIRSTNAME_ATTRIBUTE: "givenName"
      # LDAP_LASTNAME_ATTRIBUTE: "sn"
      # LDAP_TIMEOUT: "10000"
    env_file:
      - .env.local  # Загружает переменные из .env.local (если существует)
    volumes:
      # Персистентное хранилище для загружаемых файлов, документов и логов
      - ./data:/app/data
    networks:
      - plagiarismguard-network
      # - antiplag  # внешняя сеть: docker network create antiplag + compose ML-стека

  nginx:
    image: nginx:alpine
    container_name: plagiarismguard-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      # Снаружи HTTP :80 → nginx в контейнере слушает :3000 (см. nginx.conf)
      - "80:3000"
      - "3000:3000" # прежний доступ по IP:3000
      - "443:443"  # для HTTPS (если настроен SSL в nginx)
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Для SSL сертификатов (раскомментируйте при необходимости)
      # - ./ssl:/etc/nginx/ssl:ro
    networks:
      - plagiarismguard-network

networks:
  plagiarismguard-network:
    driver: bridge
  # antiplag:
  #   external: true

volumes:
  pgdata:



